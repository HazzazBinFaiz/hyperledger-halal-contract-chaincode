version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: halal-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: halal_iot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d halal_iot"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

volumes:
  timescaledb_data:
