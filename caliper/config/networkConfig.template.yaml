name: Fabric test-network for halal_contract benchmark
version: '2.0.0'
caliper:
  blockchain: fabric

channels:
  - channelName: mychannel
    contracts:
      - id: halal_contract

organizations:
  - mspid: Org1MSP
    identities:
      certificates:
        - name: User1
          clientPrivateKey:
            path: REPLACE_ORG1_KEY_PATH
          clientSignedCert:
            path: REPLACE_ORG1_CERT_PATH
    connectionProfile:
      path: REPLACE_ORG1_CONNECTION_PROFILE_PATH
      discover: true
