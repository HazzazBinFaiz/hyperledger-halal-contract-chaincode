test:
  name: latency-critical-functions
  description: Average latency comparison for critical contract functions
  workers:
    type: local
    number: 2
  rounds:
    - label: createPoultryBatch
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/latency-by-function.js
        arguments:
          contractId: halal_contract
          targetFunction: createPoultryBatch
    - label: dispatchBatchToTransport
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/latency-by-function.js
        arguments:
          contractId: halal_contract
          targetFunction: dispatchBatchToTransport
          seedCount: 400
    - label: acceptBatchForTransport
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/latency-by-function.js
        arguments:
          contractId: halal_contract
          targetFunction: acceptBatchForTransport
          seedCount: 500
    - label: deliverBatch
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/latency-by-function.js
        arguments:
          contractId: halal_contract
          targetFunction: deliverBatch
          seedCount: 600
    - label: queryTraceOfBatch
      txNumber: 200
      rateControl:
        type: fixed-rate
        opts:
          tps: 200
      workload:
        module: workload/latency-by-function.js
        arguments:
          contractId: halal_contract
          targetFunction: queryTraceOfBatch
          seedCount: 600
